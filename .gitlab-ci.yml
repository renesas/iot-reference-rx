# -----------------------------------------------------------------------------
# Build stage
# -----------------------------------------------------------------------------

build_rx65n:
  stage: build
  tags:
    - win-common-rtos-01
  before_script:
    - chcp 65001
  script:
    - python -B ./Tools/build/e2studio/headless_build.py
  interruptible: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  artifacts:
    name: "$CI_JOB_NAME"
    when: always
    paths:
      - ./mot/**/*.mot
      - ./log/**/log_build*.txt
