stages:
  - config
  - check
  - sta
  - build

variables:
  GIT_CLONE_PATH: $CI_BUILDS_DIR/frtos-test
  CONFIG_CI_ENVIRON_PATH: ./Tools/boards/environ.json

# -----------------------------------------------------------------------------
# Init stage
# -----------------------------------------------------------------------------

config_test:
  stage: config
  tags:
    - win-common-rtos-01
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
  before_script:
    - chcp 932
  script:
    - python -B ./Tools/git/submodule_update.py
  interruptible: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'

