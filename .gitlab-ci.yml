check_clang:
  stage: check
  tags:
    - win-common-rtos-01
  before_script:
    - chcp 65001
  script:
    # Run clang checker/fixer
    - python -B ./Tools/check/style/clang_format.py
  artifacts:
    when: always
    paths:
      - $GIT_CLONE_PATH/diff_output
    expire_in: 1 week
  interruptible: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  allow_failure: true

check_config:
  stage: check
  tags:
    - win-common-rtos-01
  script:
    - python -B ./Tools/check/config/check_config.py
  interruptible: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  allow_failure: true

check_module:
  stage: check
  tags:
    - win-common-rtos-01
  script:
    - python -B ./Tools/check/module/check_module.py
  interruptible: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  allow_failure: true

